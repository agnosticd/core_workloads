---
  - name: Try to install roxctl
    become: true
    delegate_to: "{{ groups['bastions'][0] }}"
    ansible.builtin.get_url:
      url: "{{ ocp4_workload_rhacs_roxctl_url }}"
      dest: /usr/bin/roxctl
      validate_certs: false
      owner: root
      group: root
      mode: ug=rwx,o=rx
    retries: 10
    delay: 5
    ignore_errors: true
