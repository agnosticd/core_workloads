---
- name: Install Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: rhacs-operator
    install_operator_namespace: "{{ ocp4_workload_rhacs_install_operator_namespace }}"
    install_operator_channel: "{{ ocp4_workload_rhacs_install_operator_channel | default('') }}"
    install_operator_automatic_install_plan_approval: "{{ ocp4_workload_rhacs_automatic_install_plan_approval | default(true) }}"
    install_operator_starting_csv: "{{ ocp4_workload_rhacs_install_operator_starting_csv }}"
    install_operator_use_catalog_snapshot: "{{ ocp4_workload_rhacs_install_operator_use_catalog_snapshot }}"
    install_operator_catalogsource_image: "{{ ocp4_workload_rhacs_install_operator_catalog_source_image | default('') }}"
    install_operator_catalogsource_image_tag: "{{ ocp4_workload_rhacs_install_operator_catalog_source_tag | default('') }}"

- name: Create Central Namespace
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_central_namespace
  until: r_central_namespace is successful
  retries: 30
  delay: 5

- name: Create collector config
  when: ocp4_workload_rhacs_collector_config_enable | bool
  kubernetes.core.k8s:
    state: present
    template: collector-config.yaml.j2
  register: r_collector_config
  until: r_collector_config is successful
  retries: 30
  delay: 5

- name: Generate admin password
  when: ocp4_workload_rhacs_central_admin_password | default('') | length == 0
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_central_admin_password: >-
      {{ lookup('password', '/dev/null chars=ascii_letters,digits '
          ~ 'length=' ~ ocp4_workload_rhacs_central_admin_password_length
      ) }}

- name: Use provided admin password
  when: ocp4_workload_rhacs_central_admin_password | default('') | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_central_admin_password: >-
      {{ ocp4_workload_rhacs_central_admin_password }}

- name: Create Secret for Central admin password
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: acs-password
        namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
      data:
        password: "{{ _ocp4_workload_rhacs_central_admin_password | b64encode }}"
      type: Opaque
  register: r_secret
  until: r_secret is successful
  retries: 30
  delay: 5

- name: Create Certificate for Central
  when: ocp4_workload_rhacs_enable_route_certs | bool
  block:
  - name: Get ClusterIssuer(s)
    kubernetes.core.k8s_info:
      api_version: cert-manager.io/v1
      kind: ClusterIssuer
    register: r_cluster_issuers
    until: r_cluster_issuers is successful
    retries: 5
    delay: 5

  - name: Fail if no ClusterIssuer is found but certificates are requested
    when: r_cluster_issuers.resources | length == 0
    ansible.builtin.fail:
      msg: "No ClusterIssuer found to issue certificates for Central"

  - name: Build list of ClusterIssuers to try (fallback issuers last)
    ansible.builtin.set_fact:
      _cluster_issuers_to_try: >-
        {{
          (r_cluster_issuers.resources | map(attribute='metadata.name') | list | reject('search', 'fallback') | list)
          + (r_cluster_issuers.resources | map(attribute='metadata.name') | list | select('search', 'fallback') | list)
        }}

  - name: Try each ClusterIssuer until certificate is issued successfully
    when: r_certificate_central is not defined or r_certificate_central is failed
    vars:
      _ocp4_workload_rhacs_cert_cluster_issuer: "{{ item }}"
    ansible.builtin.include_tasks: try_certificate_issuer.yml
    loop: "{{ _cluster_issuers_to_try }}"
    loop_control:
      label: "{{ item }}"

- name: Create Central
  vars:
    _ocp4_workload_rhacs_central_certificate: "{{ r_certificate_central is defined and r_certificate_central is succeeded }}"
  kubernetes.core.k8s:
    state: present
    template: central.yaml.j2
  register: r_k8s
  until: r_k8s is successful
  retries: 30
  delay: 5

- name: Get Central Route
  kubernetes.core.k8s_info:
    kind: Route
    api_version: route.openshift.io/v1
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
    name: central
  register: r_stackrox_central_route
  retries: 10
  delay: 20
  until: r_stackrox_central_route.resources[0].spec.host is defined

- name: Store Central Route as a fact
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_central_host: "{{ r_stackrox_central_route.resources[0].spec.host }}"
    _ocp4_workload_rhacs_central_route: "https://{{ r_stackrox_central_route.resources[0].spec.host }}"

- name: Wait for Central availability
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_rhacs_central_route }}/v1/ping"
    method: GET
    user: admin
    password: "{{ _ocp4_workload_rhacs_central_admin_password }}"
    force_basic_auth: true
    validate_certs: false
  register: result
  until: result.status == 200
  retries: 30
  delay: 20

# ACS Secured Cluster Installation
- name: Get cluster init bundle
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_rhacs_central_route }}/v1/cluster-init/init-bundles"
    # random name for init-bundle
    body: "{ \"name\": \"prod-{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=8') }}\"}"
    method: POST
    user: admin
    password: "{{ _ocp4_workload_rhacs_central_admin_password }}"
    body_format: json
    force_basic_auth: true
    validate_certs: false
  register: r_stackrox_cluster_init_response

- name: Store cluster init bundle as a fact
  ansible.builtin.set_fact:
    f_stackrox_bundle: "{{ r_stackrox_cluster_init_response.json.kubectlBundle | b64decode }}"

- name: Create init-bundle secrets
  kubernetes.core.k8s:
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
    state: present
    definition: "{{ f_stackrox_bundle }}"
  register: r_k8s
  until: r_k8s is successful
  retries: 30
  delay: 5

- name: Install Sensor on OpenShift Container Platform
  kubernetes.core.k8s:
    state: present
    template: securedcluster.yaml.j2
  register: r_k8s
  until: r_k8s is successful
  retries: 30
  delay: 5

- name: Wait for ready sensor
  kubernetes.core.k8s_info:
    name: sensor
    kind: Deployment
    api_version: apps/v1
    namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
  register: r_stackrox_sensor_deployment
  until:
  - r_stackrox_sensor_deployment.resources[0].status.readyReplicas is defined
  - r_stackrox_sensor_deployment.resources[0].status.readyReplicas | int >= 1
  delay: 20
  retries: 15

- name: Create Console Plugin
  when: ocp4_workload_rhacs_central_enable_console_plugin | bool
  kubernetes.core.k8s:
    state: present
    template: console-plugin.yaml.j2
  register: r_console_plugin
  until: r_console_plugin is successful
  retries: 5
  delay: 5

- name: Create a link in the OpenShift Console
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: console.openshift.io/v1
      kind: ConsoleLink
      metadata:
        name: acs-console-link
      spec:
        applicationMenu:
          imageURL: 'https://upload.wikimedia.org/wikipedia/commons/3/3a/OpenShift-LogoType.svg'
          section: Red Hat Applications
        href: '{{ _ocp4_workload_rhacs_central_route }}'
        location: ApplicationMenu
        text: Red Hat Advanced Cluster Security for Kubernetes
  register: r_k8s
  until: r_k8s is successful
  retries: 30
  delay: 5

- name: Enable VM scanning
  when: ocp4_workload_rhacs_enable_vm_scanning | bool
  block:
  - name: Ensure that Hyperconverged is installed
    kubernetes.core.k8s_info:
      api_version: hco.kubevirt.io/v1beta1
      kind: HyperConverged
      name: kubevirt-hyperconverged
      namespace: openshift-cnv
    register: r_hyperconverged
    until: r_hyperconverged is successful
    retries: 30
    delay: 5

  - name: Fail if Hyperconverged is not installed
    when: r_hyperconverged.resources | default([]) | length == 0
    ansible.builtin.fail:
      msg: "Hyperconverged is not installed"

  - name: Patch Hyperconverged
    kubernetes.core.k8s:
      state: patched
      definition:
        api_version: hco.kubevirt.io/v1beta1
        kind: HyperConverged
        name: kubevirt-hyperconverged
        namespace: openshift-cnv
        spec:
          configuration:
            developerConfiguration:
              featureGates:
              - VSOCK
    register: r_hyperconverged_patched
    until: r_hyperconverged_patched is successful
    retries: 30
    delay: 5

- name: Print user info
  agnosticd.core.agnosticd_user_info:
    msg: "{{ item }}"
  loop:
  - ""
  - "Your RHACS console is available at: {{ _ocp4_workload_rhacs_central_route }}"
  - "RHACS portal username: admin"
  - "RHACS portal password: {{ _ocp4_workload_rhacs_central_admin_password }}"

- name: Save user data
  agnosticd.core.agnosticd_user_info:
    data:
      acs_route: "{{ _ocp4_workload_rhacs_central_route }}"
      acs_portal_username: admin
      acs_portal_password: "{{ _ocp4_workload_rhacs_central_admin_password }}"
