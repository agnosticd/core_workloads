---
# DNS Registration for RHACS Central Route
# Only runs on BareMetal clusters

- name: Get cluster infrastructure platform
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Infrastructure
    name: cluster
  register: r_infrastructure

- name: Set platform fact
  ansible.builtin.set_fact:
    _ocp4_workload_rhacs_platform: "{{ r_infrastructure.resources[0].status.platform | default('Unknown') }}"

- name: Register DNS A record for Central route
  when: _ocp4_workload_rhacs_platform in ["BareMetal","None"] # None is for SNO
  block:
  - name: Get Central route information
    kubernetes.core.k8s_info:
      api_version: route.openshift.io/v1
      kind: Route
      name: central
      namespace: "{{ ocp4_workload_rhacs_central_namespace }}"
    register: r_central_route_dns

  - name: Extract route hostname and router details
    ansible.builtin.set_fact:
      _ocp4_workload_rhacs_route_hostname: "{{ r_central_route_dns.resources[0].spec.host }}"
      _ocp4_workload_rhacs_router_hostname: "{{ r_central_route_dns.resources[0].status.ingress[0].routerCanonicalHostname }}"

  - name: Resolve router IP address
    ansible.builtin.set_fact:
      _ocp4_workload_rhacs_router_ip: "{{ lookup('dig', _ocp4_workload_rhacs_router_hostname) }}"

  - name: Get ClusterIssuer with DNS configuration
    kubernetes.core.k8s_info:
      api_version: cert-manager.io/v1
      kind: ClusterIssuer
    register: r_cluster_issuers_dns

  - name: Find ClusterIssuer with DNS01 solver
    ansible.builtin.set_fact:
      _ocp4_workload_rhacs_dns_issuer: >-
        {{
          r_cluster_issuers_dns.resources
          | selectattr('spec.acme.solvers', 'defined')
          | selectattr('spec.acme.solvers', 'search', 'dns01')
          | first
        }}
    when: r_cluster_issuers_dns.resources | length > 0

  - name: If using ddns, create specific route
    when: _ocp4_workload_rhacs_dns_issuer.spec.acme.solvers[0].dns01.webhook.config.ddnsServer | default("") | length > 0
    block:
  
    - name: Extract DNS configuration from ClusterIssuer
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_ddns_server: "{{ _ocp4_workload_rhacs_dns_issuer.spec.acme.solvers[0].dns01.webhook.config.ddnsServer }}"
        _ocp4_workload_rhacs_ddns_zone: "{{ _ocp4_workload_rhacs_dns_issuer.spec.acme.solvers[0].dns01.webhook.config.ddnsZone }}"
        _ocp4_workload_rhacs_tsig_key_name: "{{ _ocp4_workload_rhacs_dns_issuer.spec.acme.solvers[0].dns01.webhook.config.tsigKeyName }}"
        _ocp4_workload_rhacs_tsig_algorithm: "{{ _ocp4_workload_rhacs_dns_issuer.spec.acme.solvers[0].dns01.webhook.config.tsigAlgorithm }}"
        _ocp4_workload_rhacs_tsig_secret_ref: "{{ _ocp4_workload_rhacs_dns_issuer.spec.acme.solvers[0].dns01.webhook.config.tsigSecretRef }}"
  
    - name: Get TSIG secret from cert-manager
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ _ocp4_workload_rhacs_tsig_secret_ref.name }}"
        namespace: cert-manager
      register: r_tsig_secret
  
    - name: Extract TSIG secret value
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_tsig_secret: "{{ r_tsig_secret.resources[0].data[_ocp4_workload_rhacs_tsig_secret_ref.key] | b64decode }}"
  
    - name: Extract record name from full hostname
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_record_name: "{{ _ocp4_workload_rhacs_route_hostname | regex_replace('\\.' + _ocp4_workload_rhacs_ddns_zone + '$', '') }}"
  
    - name: Check if DNS record already exists
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_existing_dns: "{{ lookup('dig', _ocp4_workload_rhacs_route_hostname, '@' + _ocp4_workload_rhacs_ddns_server, wantlist=True) | first | default('') }}"
  
    - name: Add DNS A record for Central route
      when: _ocp4_workload_rhacs_existing_dns != _ocp4_workload_rhacs_router_ip
      community.general.nsupdate:
        key_name: "{{ _ocp4_workload_rhacs_tsig_key_name }}"
        key_secret: "{{ _ocp4_workload_rhacs_tsig_secret }}"
        key_algorithm: "{{ _ocp4_workload_rhacs_tsig_algorithm }}"
        server: "{{ _ocp4_workload_rhacs_ddns_server }}"
        zone: "{{ _ocp4_workload_rhacs_ddns_zone }}"
        record: "{{ _ocp4_workload_rhacs_record_name }}"
        type: "A"
        value: "{{ _ocp4_workload_rhacs_router_ip }}"
        ttl: "{{ ocp4_workload_rhacs_dns_record_ttl }}"
        state: present
      register: r_dns_update
  
    - name: Wait for DNS propagation
      when: r_dns_update is changed
      ansible.builtin.set_fact:
        _ocp4_workload_rhacs_dns_check: "{{ lookup('dig', _ocp4_workload_rhacs_route_hostname, '@' + _ocp4_workload_rhacs_ddns_server, wantlist=True) | first | default('') }}"
      retries: 5
      delay: 2
      until: _ocp4_workload_rhacs_dns_check == _ocp4_workload_rhacs_router_ip
