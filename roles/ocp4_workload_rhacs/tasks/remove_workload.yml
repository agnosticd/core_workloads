---
- name: Remove stackrox namespace
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: stackrox
  register: r_k8s
  until: r_k8s is successful
  retries: 30
  delay: 5

- name: Delete rbac
  ansible.builtin.shell: >-
    set -o pipefail &&
    oc get clusterrole,clusterrolebinding,role,rolebinding,psp -o name
    | grep stackrox | xargs oc delete --wait
  changed_when: true

- name: Delete scc
  ansible.builtin.command: >-
    oc delete scc -l "app.kubernetes.io/name=stackrox"
  changed_when: true

- name: Remove webhook
  kubernetes.core.k8s:
    state: absent
    api_versionersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    name: stackrox
  register: r_k8s
  until: r_k8s is successful
  retries: 30
  delay: 5

- name: Remove all labels from all namespaces
  ansible.builtin.shell: # noqa: risky-shell-pipe
    cmd: |
      set -o pipefail
      for namespace in $(oc get ns | tail -n +2 | awk '{print $1}'); do
        oc label namespace $namespace namespace.metadata.stackrox.io/id-;
        oc label namespace $namespace namespace.metadata.stackrox.io/name-;
        oc annotate namespace $namespace modified-by.stackrox.io/namespace-label-patcher-;
      done
  changed_when: true

- name: Remove Operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: remove
    install_operator_name: rhacs-operator