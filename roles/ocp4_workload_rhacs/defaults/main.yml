---
ocp4_workload_rhacs_install_operator_namespace: rhacs-operator
ocp4_workload_rhacs_install_operator_channel: rhacs-4.10

ocp4_workload_rhacs_install_operator_use_catalog_snapshot: false
ocp4_workload_rhacs_install_operator_catalog_source_image: quay.io/rhpds/olm_snapshot_redhat_catalog
ocp4_workload_rhacs_install_operator_catalog_source_tag: "v4.20_2026_03_09"

ocp4_workload_rhacs_automatic_install_plan_approval: true
ocp4_workload_rhacs_install_operator_starting_csv: ""

ocp4_workload_rhacs_central_namespace: stackrox
# Enable the new V4 central scanner
ocp4_workload_rhacs_enable_central_scanner_v4: false

# Enable scanning of VMs
# OCP Virtualization must also be configured properly
# oc patch hyperconverged kubevirt-hyperconverged -n openshift-cnv
# --type='merge' --patch='{"spec":{"configuration":{"developerConfiguration":{"featureGates":["VSOCK"]}}}}'
ocp4_workload_rhacs_enable_vm_scanning: false

# Put a proper certificate on Central
# Cert Manager has to be deployed and at least one ClusterIssuer has to be present
# If multiple ClusterIssuers are present, the role will try each one until a certificate is issued successfully
# If no certificate is issued successfully, the role will deploy Central without a proper certificate
ocp4_workload_rhacs_enable_route_certs: true

# Enable collector config for rhacs 4.8+
ocp4_workload_rhacs_collector_config_enable: false
ocp4_workload_rhacs_collector_config_expternal_ips_enable: true

# Set the default password for the Central admin user (empty will generate a random password)
ocp4_workload_rhacs_central_admin_password: ""
ocp4_workload_rhacs_central_admin_password_length: 18

# Enable the Console Plugin. RHACS 4.10 and higher is required
ocp4_workload_rhacs_central_enable_console_plugin: false

# Install roxctl on the Bastion host
ocp4_workload_rhacs_install_roxctl: false
ocp4_workload_rhacs_roxctl_url: https://mirror.openshift.com/pub/rhacs/assets/latest/bin/linux/roxctl

# --------------------------------
# Resource Override Variables
# --------------------------------
# When _update is false (default), no resource overrides are applied
# and the role behaves identically to stock upstream.
# Set _update to true and adjust values to customize resource requests/limits.

# Central pod resources
ocp4_workload_rhacs_central_resources_update: false
ocp4_workload_rhacs_central_requests_cpu: "1500m"
ocp4_workload_rhacs_central_requests_memory: "4Gi"
ocp4_workload_rhacs_central_limits_cpu: "4"
ocp4_workload_rhacs_central_limits_memory: "8Gi"

# Central DB resources
ocp4_workload_rhacs_central_db_resources_update: false
ocp4_workload_rhacs_central_db_requests_cpu: "4000m"
ocp4_workload_rhacs_central_db_requests_memory: "8Gi"
ocp4_workload_rhacs_central_db_limits_cpu: "4"
ocp4_workload_rhacs_central_db_limits_memory: "8Gi"

# Scanner (v2) analyzer resources
ocp4_workload_rhacs_scanner_resources_update: false
ocp4_workload_rhacs_scanner_requests_cpu: "1000m"
ocp4_workload_rhacs_scanner_requests_memory: "1500Mi"
ocp4_workload_rhacs_scanner_limits_cpu: "2"
ocp4_workload_rhacs_scanner_limits_memory: "3Gi"

# Scanner V4 resources (indexer, matcher, db) and replica counts
ocp4_workload_rhacs_scanner_v4_resources_update: false
ocp4_workload_rhacs_scanner_v4_indexer_replicas: 3
ocp4_workload_rhacs_scanner_v4_indexer_requests_cpu: "2"
ocp4_workload_rhacs_scanner_v4_indexer_requests_memory: "1500Mi"
ocp4_workload_rhacs_scanner_v4_indexer_limits_cpu: "2"
ocp4_workload_rhacs_scanner_v4_indexer_limits_memory: "3Gi"
ocp4_workload_rhacs_scanner_v4_matcher_replicas: 3
ocp4_workload_rhacs_scanner_v4_matcher_requests_cpu: "1"
ocp4_workload_rhacs_scanner_v4_matcher_requests_memory: "1500Mi"
ocp4_workload_rhacs_scanner_v4_matcher_limits_cpu: "2"
ocp4_workload_rhacs_scanner_v4_matcher_limits_memory: "7Gi"
ocp4_workload_rhacs_scanner_v4_db_requests_cpu: "200m"
ocp4_workload_rhacs_scanner_v4_db_requests_memory: "3Gi"
ocp4_workload_rhacs_scanner_v4_db_limits_cpu: "2"
ocp4_workload_rhacs_scanner_v4_db_limits_memory: "4Gi"

# Sensor resources (via SecuredCluster CR)
ocp4_workload_rhacs_sensor_resources_update: false
ocp4_workload_rhacs_sensor_requests_cpu: "2000m"
ocp4_workload_rhacs_sensor_requests_memory: "4Gi"
ocp4_workload_rhacs_sensor_limits_cpu: "4"
ocp4_workload_rhacs_sensor_limits_memory: "8Gi"

# Storage class for all PVCs (empty = use cluster default)
ocp4_workload_rhacs_central_storage_class: ""

# --------------------------------
# DNS Registration
# --------------------------------
# When enabled, automatically registers DNS A record for the Central route
# Only applies to BareMetal clusters
# Requires cert-manager ClusterIssuer with DNS01 solver configured
ocp4_workload_rhacs_enable_dns_registration: true
ocp4_workload_rhacs_dns_record_ttl: 30

# --------------------------------
# OpenShift OAuth Authentication
# --------------------------------
# When enabled, configures the built-in OpenShift OAuth server as an
# auth provider on RHACS Central. All OpenShift users get the minimum access role.
ocp4_workload_rhacs_openshift_auth_enable: false
ocp4_workload_rhacs_openshift_auth_minimum_access_role: "None"
