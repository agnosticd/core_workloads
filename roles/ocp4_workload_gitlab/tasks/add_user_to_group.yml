---
# Add a user to a group with the access_level defined in the group config
# Expects:
#   _user_data: User info with id and username
#   _group_path: Group path to add user to

- name: Get group info for {{ _group_path }}
  ansible.builtin.uri:
    url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/groups/{{ _group_path }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
    validate_certs: false
    status_code: 200
  register: r_group_info

- name: Find group configuration for {{ _group_path }}
  ansible.builtin.set_fact:
    _group_config: "{{ ocp4_workload_gitlab_user_repositories | selectattr('path', 'equalto', _group_path) | first }}"

- name: Add user {{ _user_data.username }} to group {{ _group_path }}
  ansible.builtin.uri:
    url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/groups/{{ r_group_info.json.id }}/members"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      user_id: "{{ _user_data.id }}"
      access_level: "{{ _group_config.access_level }}"
    validate_certs: false
    status_code: [201, 409]
  register: r_add_member
