---
#####################################################################
# Setup and Validation
#####################################################################

- name: Validate root password length
  ansible.builtin.assert:
    that:
    - ocp4_workload_gitlab_root_password | length >= 8
    quiet: true
    fail_msg: >-
      GitLab root password must be at least 8 characters long.
      Current length: {{ ocp4_workload_gitlab_root_password | length }}

- name: Generate Keycloak client secret if not provided
  when:
  - ocp4_workload_gitlab_auth_mode == 'keycloak'
  - ocp4_workload_gitlab_keycloak_client_secret | length == 0
  ansible.builtin.set_fact:
    _ocp4_workload_gitlab_keycloak_client_secret: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"

- name: Use provided Keycloak client secret
  when:
  - ocp4_workload_gitlab_auth_mode == 'keycloak'
  - ocp4_workload_gitlab_keycloak_client_secret | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_gitlab_keycloak_client_secret: "{{ ocp4_workload_gitlab_keycloak_client_secret }}"

#####################################################################
# Create Namespace
#####################################################################

- name: Create GitLab namespace
  kubernetes.core.k8s:
    state: present
    template: namespace.yaml.j2

#####################################################################
# Setup Keycloak Integration (if needed)
#####################################################################

- name: Setup Keycloak integration
  when: ocp4_workload_gitlab_auth_mode == 'keycloak'
  block:
  - name: Get Keycloak route
    kubernetes.core.k8s_info:
      api_version: route.openshift.io/v1
      kind: Route
      name: keycloak
      namespace: "{{ ocp4_workload_gitlab_keycloak_namespace }}"
    register: r_keycloak_route
    retries: 10
    delay: 30
    until:
    - r_keycloak_route.resources is defined
    - r_keycloak_route.resources | length > 0

  - name: Set Keycloak URL
    ansible.builtin.set_fact:
      _ocp4_workload_gitlab_keycloak_url: "https://{{ r_keycloak_route.resources[0].spec.host }}"

  - name: Create Keycloak client for GitLab
    kubernetes.core.k8s:
      state: present
      template: keycloak-client-secret.yaml.j2

  - name: Get Keycloak admin credentials
    kubernetes.core.k8s_info:
      api_version: v1
      kind: Secret
      name: keycloak-initial-admin
      namespace: "{{ ocp4_workload_gitlab_keycloak_namespace }}"
    register: r_keycloak_admin
    retries: 10
    delay: 30
    until:
    - r_keycloak_admin.resources is defined
    - r_keycloak_admin.resources | length > 0

  - name: Set Keycloak admin credentials
    ansible.builtin.set_fact:
      _ocp4_workload_gitlab_keycloak_admin_user: "{{ r_keycloak_admin.resources[0].data.username | b64decode }}"
      _ocp4_workload_gitlab_keycloak_admin_password: "{{ r_keycloak_admin.resources[0].data.password | b64decode }}"

#####################################################################
# Get GitLab Route Hostname
#####################################################################

- name: Set GitLab hostname
  when: ocp4_workload_gitlab_hostname | default("") | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_gitlab_hostname: "{{ ocp4_workload_gitlab_hostname }}.{{ openshift_cluster_ingress_domain }}"

- name: Generate GitLab hostname if not provided
  when: ocp4_workload_gitlab_hostname | default("") | length == 0
  ansible.builtin.set_fact:
    _ocp4_workload_gitlab_route: "gitlab-{{ ocp4_workload_gitlab_namespace }}.{{ openshift_cluster_ingress_domain }}"

- name: Use provided GitLab hostname
  when: ocp4_workload_gitlab_hostname | default("") | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_gitlab_route: "{{ _ocp4_workload_gitlab_hostname }}"

#####################################################################
# Deploy GitLab
#####################################################################

- name: Deploy GitLab resources
  kubernetes.core.k8s:
    state: present
    template: "{{ item }}"
  loop:
  - gitlab-serviceaccount-rbac.yaml.j2
  - gitlab-config-secrets.yaml.j2
  - gitlab-postgresql-pvcs.yaml.j2
  - postgresql.yaml.j2
  - redis.yaml.j2
  - gitlab-deployment.yaml.j2

#####################################################################
# Wait for GitLab to be Ready
#####################################################################

- name: Wait for GitLab route to be available
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: gitlab
    namespace: "{{ ocp4_workload_gitlab_namespace }}"
  register: r_gitlab_route
  until:
  - r_gitlab_route.resources is defined
  - r_gitlab_route.resources | length > 0
  - r_gitlab_route.resources[0].spec.host is defined
  retries: 30
  delay: 10

- name: Update GitLab route fact
  ansible.builtin.set_fact:
    _ocp4_workload_gitlab_route: "{{ r_gitlab_route.resources[0].spec.host }}"

- name: Wait for GitLab pod to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_gitlab_namespace }}"
    label_selectors:
    - app=gitlab
  register: r_gitlab_pod
  until:
  - r_gitlab_pod.resources is defined
  - r_gitlab_pod.resources | length > 0
  - r_gitlab_pod.resources[0].status.phase is defined
  - r_gitlab_pod.resources[0].status.phase == 'Running'
  - r_gitlab_pod.resources[0].status.containerStatuses is defined
  - r_gitlab_pod.resources[0].status.containerStatuses | length > 0
  - r_gitlab_pod.resources[0].status.containerStatuses[0].ready | bool
  retries: "{{ ocp4_workload_gitlab_wait_retries }}"
  delay: "{{ ocp4_workload_gitlab_wait_delay }}"

- name: Wait for GitLab to respond to HTTP requests
  ansible.builtin.uri:
    url: "https://{{ _ocp4_workload_gitlab_route }}/users/sign_in"
    method: GET
    validate_certs: false
    status_code: 200
  register: r_gitlab_http
  until: r_gitlab_http.status == 200
  retries: 60
  delay: 10

#####################################################################
# Create GitLab Root Personal Access Token
#####################################################################

- name: Create root PAT using gitlab-rails
  ansible.builtin.include_tasks: create_root_pat.yml
  # This creates a long-lived Personal Access Token (365 days)
  # with full API access (api, read_api, read_user, read_repository,
  # write_repository, sudo scopes). It is used by:
  # - Keycloak group sync cronjob
  # - Any other automation that needs to interact with GitLab API
  # Secret name: gitlab-root-token (in GitLab namespace)
  # Key: token

#####################################################################
# Configure Application Settings
#####################################################################

- name: Configure GitLab application settings
  when: ocp4_workload_gitlab_application_settings | length > 0
  ansible.builtin.uri:
    url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/application/settings"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ ocp4_workload_gitlab_application_settings }}"
    validate_certs: false
    status_code: 200
  register: r_app_settings
  retries: 5
  delay: 10

#####################################################################
# Create Users
#####################################################################

- name: Create users in GitLab (native auth)
  when:
  - ocp4_workload_gitlab_auth_mode == 'native'
  - ocp4_workload_gitlab_user_count | int > 0
  ansible.builtin.uri:
    url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/users"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      email: "{{ ocp4_workload_gitlab_user_base }}{{ item }}@{{ ocp4_workload_gitlab_user_email_domain }}"
      username: "{{ ocp4_workload_gitlab_user_base }}{{ item }}"
      name: "{{ ocp4_workload_gitlab_user_base | title }} {{ item }}"
      password: "{{ ocp4_workload_gitlab_user_password }}"
      skip_confirmation: true
    validate_certs: false
    status_code: [201, 409]
  loop: "{{ range(1, ocp4_workload_gitlab_user_count | int + 1) | list }}"
  register: r_create_users

- name: Create users in GitLab (keycloak auth)
  when: ocp4_workload_gitlab_auth_mode == 'keycloak'
  block:
  - name: Get Keycloak admin access token
    ansible.builtin.uri:
      url: "{{ _ocp4_workload_gitlab_keycloak_url }}/realms/master/protocol/openid-connect/token"
      method: POST
      body_format: form-urlencoded
      body:
        grant_type: password
        client_id: admin-cli
        username: "{{ _ocp4_workload_gitlab_keycloak_admin_user }}"
        password: "{{ _ocp4_workload_gitlab_keycloak_admin_password }}"
      validate_certs: false
      status_code: 200
    register: r_keycloak_token

  - name: Get all users from Keycloak realm
    ansible.builtin.uri:
      url: "{{ _ocp4_workload_gitlab_keycloak_url }}/admin/realms/{{ ocp4_workload_gitlab_keycloak_realm }}/users"
      method: GET
      headers:
        Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
      validate_certs: false
      status_code: 200
    register: r_keycloak_users

  - name: Create users in GitLab with OIDC provider linkage
    ansible.builtin.uri:
      url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/users"
      method: POST
      headers:
        PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
        Content-Type: "application/json"
      body_format: json
      body:
        email: "{{ item.email }}"
        username: "{{ item.username }}"
        name: "{{ item.firstName | default('') }} {{ item.lastName | default('') }}"
        extern_uid: "{{ item.username }}"
        provider: "openid_connect"
        force_random_password: true
        skip_confirmation: true
      validate_certs: false
      status_code: [201, 409]
    loop: "{{ r_keycloak_users.json | rejectattr('username', 'in', ['admin', 'root', 'ghost']) | list }}"
    loop_control:
      label: "{{ item.username }}"
    register: r_create_users

#####################################################################
# Create Root Groups and Import Repositories
#####################################################################

- name: Create root groups and import repositories
  when: ocp4_workload_gitlab_root_repositories | length > 0
  ansible.builtin.include_tasks: create_root_groups.yml

#####################################################################
# Create User Groups and Import Repositories
#####################################################################

- name: Create user groups and import repositories
  when: ocp4_workload_gitlab_user_repositories | length > 0
  ansible.builtin.include_tasks: create_user_groups.yml

#####################################################################
# Add Users to Groups
#####################################################################

- name: Add users to groups based on default access levels
  when:
  - ocp4_workload_gitlab_user_count | int > 0 or ocp4_workload_gitlab_auth_mode == 'keycloak'
  - ocp4_workload_gitlab_user_default_access_levels | length > 0
  - ocp4_workload_gitlab_user_repositories | length > 0
  block:
  - name: Get user IDs from GitLab
    ansible.builtin.uri:
      url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/users?username={{ item }}"
      method: GET
      headers:
        PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
      validate_certs: false
      status_code: 200
    loop: >-
      {{
        (range(1, ocp4_workload_gitlab_user_count | int + 1) | map('string') | map('regex_replace', '^(.*)$', ocp4_workload_gitlab_user_base ~ '\\1') | list)
        if ocp4_workload_gitlab_auth_mode == 'native'
        else (r_keycloak_users.json | rejectattr('username', 'in', ['admin', 'root', 'ghost']) | map(attribute='username') | list)
      }}
    loop_control:
      label: "{{ item }}"
    register: r_user_ids

  - name: Add users to matching groups
    ansible.builtin.include_tasks: add_user_to_group.yml
    vars:
      _user_data: "{{ item.0.json[0] }}"
      _group_config: "{{ item.1 }}"
    loop: "{{ r_user_ids.results | rejectattr('skipped', 'defined') | selectattr('json', 'defined') | product(ocp4_workload_gitlab_user_repositories | selectattr('access_level', 'in', ocp4_workload_gitlab_user_default_access_levels) | list) | list }}"
    when:
    - item.0.json is defined
    - item.0.json | length > 0
    loop_control:
      label: "{{ item.0.json[0].username }} -> {{ item.1.path }}"

#####################################################################
# Setup GitLab Runner
#####################################################################

- name: Setup GitLab Runner
  when: ocp4_workload_gitlab_runner_enabled | bool
  block:
  - name: Get runner registration token from GitLab
    ansible.builtin.uri:
      url: "https://{{ _ocp4_workload_gitlab_route }}/api/v4/runners/reset_registration_token"
      method: POST
      headers:
        PRIVATE-TOKEN: "{{ _gitlab_automation_token }}"
      validate_certs: false
      status_code: [200, 201]
    register: r_runner_token

  - name: Set runner registration token
    ansible.builtin.set_fact:
      _gitlab_runner_registration_token: "{{ r_runner_token.json.token }}"

  - name: Deploy GitLab Runner resources
    kubernetes.core.k8s:
      state: present
      template: "{{ item }}"
    loop:
    - gitlab-runner-token.yaml.j2
    - gitlab-runner.yaml.j2

#####################################################################
# Report Information
#####################################################################

- name: Report GitLab access information
  agnosticd.core.agnosticd_user_info:
    msg: "GitLab is available at https://{{ _ocp4_workload_gitlab_route }}"
    data:
      gitlab_url: "https://{{ _ocp4_workload_gitlab_route }}"
      gitlab_root_username: "root"
      gitlab_root_password: "{{ ocp4_workload_gitlab_root_password }}"

- name: Report user credentials (native auth)
  when:
  - ocp4_workload_gitlab_auth_mode == 'native'
  - ocp4_workload_gitlab_user_count | int > 0
  block:
  - name: Report multiple users
    when: ocp4_workload_gitlab_user_count | int > 1
    agnosticd.core.agnosticd_user_info:
      msg: >-
        GitLab users {{ ocp4_workload_gitlab_user_base }}1 through
        {{ ocp4_workload_gitlab_user_base }}{{ ocp4_workload_gitlab_user_count }}
        have been created with password: {{ ocp4_workload_gitlab_user_password }}

  - name: Report single user
    when: ocp4_workload_gitlab_user_count | int == 1
    agnosticd.core.agnosticd_user_info:
      msg: >-
        GitLab user {{ ocp4_workload_gitlab_user_base }}1 has been created
        with password: {{ ocp4_workload_gitlab_user_password }}
      data:
        gitlab_username: "{{ ocp4_workload_gitlab_user_base }}1"
        gitlab_password: "{{ ocp4_workload_gitlab_user_password }}"

  - name: Save user details per created user
    when: ocp4_workload_gitlab_user_count | int > 1
    agnosticd.core.agnosticd_user_info:
      user: "{{ ocp4_workload_gitlab_user_base }}{{ item }}"
      data:
        gitlab_username: "{{ ocp4_workload_gitlab_user_base }}{{ item }}"
        gitlab_password: "{{ ocp4_workload_gitlab_user_password }}"
        gitlab_url: "https://{{ _ocp4_workload_gitlab_route }}"
    loop: "{{ range(1, ocp4_workload_gitlab_user_count | int + 1) | list }}"

- name: Report Keycloak integration
  when: ocp4_workload_gitlab_auth_mode == 'keycloak'
  agnosticd.core.agnosticd_user_info:
    msg: "GitLab is integrated with Keycloak. Users can log in using their Keycloak credentials."
