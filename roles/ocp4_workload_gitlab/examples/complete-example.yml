---
# Complete GitLab Workload Example Configuration
# This example shows all major features of the ocp4_workload_gitlab role

# ============================================================================
# Example 1: Basic GitLab with Native Authentication and Users
# ============================================================================
- name: Deploy GitLab with native authentication
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with 10 users
    include_role:
      name: ocp4_workload_gitlab
    vars:
      # Basic settings
      ocp4_workload_gitlab_namespace: gitlab

      # Root password is auto-generated by default (recommended)
      # To use a custom password (must be 8+ characters):
      # ocp4_workload_gitlab_root_password: "YourPassword123"

      # Create 10 users: student1, student2, ..., student10
      ocp4_workload_gitlab_user_count: 10
      ocp4_workload_gitlab_user_base: student
      ocp4_workload_gitlab_user_password: "openshift"

      # Storage
      ocp4_workload_gitlab_volume_size: 50Gi
      ocp4_workload_gitlab_volume_storage_class: 'gp3-csi'

# ============================================================================
# Example 2: GitLab with Root Repository Import
# ============================================================================
- name: Deploy GitLab with root repositories
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with imported repos for root
    include_role:
      name: ocp4_workload_gitlab
    vars:
      ocp4_workload_gitlab_namespace: gitlab

      # Import multiple repositories for the root user
      ocp4_workload_gitlab_root_repositories:
      # Public repository - visible to everyone
      - name: "agnosticd-v2"
        url: "https://github.com/agnosticd/agnosticd-v2.git"
        visibility: "public"

      # Internal repository - visible to authenticated users only
      - name: "core-workloads"
        url: "https://github.com/agnosticd/core_workloads.git"
        visibility: "internal"

      # Private repository - visible only to root user
      - name: "ansible-playbooks"
        url: "https://github.com/redhat-cop/openshift-playbooks.git"
        visibility: "private"

# ============================================================================
# Example 3: GitLab with User Repository Import
# ============================================================================
- name: Deploy GitLab with user repositories
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with repos for each user
    include_role:
      name: ocp4_workload_gitlab
    vars:
      ocp4_workload_gitlab_namespace: gitlab

      # Create 5 users
      ocp4_workload_gitlab_user_count: 5
      ocp4_workload_gitlab_user_base: developer

      # Import repositories for EACH user
      ocp4_workload_gitlab_user_repositories:
      # Private repo with developer access - each user gets their own copy
      - name: "sample-app"
        url: "https://github.com/openshift/nodejs-ex.git"
        visibility: "private"
        access_level: "developer"        # Users can push code

      # Internal repo with maintainer access
      - name: "workshop-exercises"
        url: "https://github.com/example/workshop.git"
        visibility: "internal"
        access_level: "maintainer"       # Users can manage branches and settings

      # Public read-only documentation
      - name: "documentation"
        url: "https://github.com/example/docs.git"
        visibility: "public"
        access_level: "reporter"         # Users can only read and comment

# ============================================================================
# Example 4: Complete Workshop Setup (Root + User Repos)
# ============================================================================
- name: Deploy GitLab for a complete workshop
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy complete workshop environment
    include_role:
      name: ocp4_workload_gitlab
    vars:
      # Basic configuration
      ocp4_workload_gitlab_namespace: gitlab-workshop
      # Root password auto-generated by default (recommended for security)

      # Create users
      ocp4_workload_gitlab_user_count: 15
      ocp4_workload_gitlab_user_base: user
      ocp4_workload_gitlab_user_password: "openshift"
      ocp4_workload_gitlab_user_email_domain: workshop.example.com

      # Root user repositories (instructor/admin access)
      ocp4_workload_gitlab_root_repositories:
      # Solutions repository - only root can see
      - name: "workshop-solutions"
        url: "https://github.com/instructor/solutions.git"
        visibility: "private"

      # Main workshop content - everyone can view
      - name: "workshop-content"
        url: "https://github.com/workshop/main-content.git"
        visibility: "public"

      # Grading scripts - authenticated users can see
      - name: "grading-automation"
        url: "https://github.com/workshop/grader.git"
        visibility: "internal"

      # Student repositories (each student gets their own copy)
      ocp4_workload_gitlab_user_repositories:
      # Main lab exercise - students can push their work
      - name: "lab-exercises"
        url: "https://github.com/workshop/lab-exercises.git"
        visibility: "private"
        access_level: "developer"

      # Starter application - students fork and modify
      - name: "my-app"
        url: "https://github.com/workshop/starter-app.git"
        visibility: "private"
        access_level: "maintainer"        # Students have full control

      # Reference materials - read-only for students
      - name: "reference-docs"
        url: "https://github.com/workshop/reference.git"
        visibility: "public"
        access_level: "reporter"          # Read-only access

      # Storage configuration
      ocp4_workload_gitlab_volume_size: 100Gi
      ocp4_workload_gitlab_postgresql_volume_size: 50Gi

# ============================================================================
# Example 5: GitLab with Keycloak Authentication
# ============================================================================
- name: Deploy GitLab with Keycloak integration
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with Keycloak SSO
    include_role:
      name: ocp4_workload_gitlab
    vars:
      # Keycloak authentication mode
      ocp4_workload_gitlab_auth_mode: keycloak
      ocp4_workload_gitlab_keycloak_namespace: keycloak
      ocp4_workload_gitlab_keycloak_realm: workshop
      ocp4_workload_gitlab_keycloak_client_id: gitlab

      # Define groups to sync from Keycloak to GitLab
      # Groups will be created in Keycloak if they don't exist
      # Users in these Keycloak groups will be added to GitLab groups
      ocp4_workload_gitlab_keycloak_groups:
      - name: "developers"
        access_level: "developer"        # Can push code
      - name: "team-leads"
        access_level: "maintainer"       # Can manage repositories
      - name: "admins"
        access_level: "owner"            # Full admin access

      # Sync every minute (default)
      ocp4_workload_gitlab_keycloak_sync_schedule: "*/1 * * * *"

      # Root repositories (shared resources)
      ocp4_workload_gitlab_root_repositories:
      - name: "company-standards"
        url: "https://github.com/company/standards.git"
        visibility: "internal"
      - name: "shared-libraries"
        url: "https://github.com/company/libraries.git"
        visibility: "internal"

# ============================================================================
# Example 6: GitLab with Custom Application Settings
# ============================================================================
- name: Deploy GitLab with custom application settings
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with custom settings
    include_role:
      name: ocp4_workload_gitlab
    vars:
      ocp4_workload_gitlab_namespace: gitlab

      # Custom application settings
      ocp4_workload_gitlab_application_settings:
        # Import sources
        import_sources:
        - git
        - github
        - gitlab

        # Disable version check
        version_check_enabled: false

        # Account and limit settings
        signup_enabled: false
        default_projects_limit: 50
        max_attachment_size: 100

        # Email settings
        email_author_in_body: true
        require_admin_approval_after_user_signup: true

        # Webhook settings
        allow_local_requests_from_web_hooks_and_services: true
        allow_local_requests_from_system_hooks: true

        # Auto DevOps
        auto_devops_enabled: false

        # Rate limiting (disable for workshops)
        throttle_unauthenticated_enabled: false
        throttle_authenticated_api_enabled: false
        throttle_authenticated_web_enabled: false

        # Git settings
        default_branch_protection: 0  # No protection
        password_authentication_enabled_for_web: true
        password_authentication_enabled_for_git: true

# ============================================================================
# Example 7: Minimal GitLab (No Users, No Repos)
# ============================================================================
- name: Deploy minimal GitLab instance
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with only root user
    include_role:
      name: ocp4_workload_gitlab
    vars:
      ocp4_workload_gitlab_namespace: gitlab
      # Root password auto-generated by default

      # No users created (user_count defaults to 0)
      # No repositories imported (arrays are empty by default)

      # Just GitLab with root access for manual configuration

# ============================================================================
# Example 7: GitLab with Custom Storage Classes
# ============================================================================
- name: Deploy GitLab with ODF storage
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy GitLab with custom storage
    include_role:
      name: ocp4_workload_gitlab
    vars:
      # Custom storage classes for ODF
      ocp4_workload_gitlab_volume_size: 200Gi
      ocp4_workload_gitlab_volume_storage_class: ocs-storagecluster-ceph-rbd

      ocp4_workload_gitlab_postgresql_volume_size: 100Gi
      ocp4_workload_gitlab_postgresql_volume_storage_class: ocs-storagecluster-ceph-rbd

      # Resource limits for large deployments
      ocp4_workload_gitlab_memory_request: 8Gi
      ocp4_workload_gitlab_memory_limit: 16Gi
      ocp4_workload_gitlab_cpu_request: 4
      ocp4_workload_gitlab_cpu_limit: 8

# ============================================================================
# Example 9: Real-World DevSecOps Workshop
# ============================================================================
- name: Deploy GitLab for DevSecOps workshop
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Deploy complete DevSecOps environment
    include_role:
      name: ocp4_workload_gitlab
    vars:
      ocp4_workload_gitlab_namespace: devsecops-gitlab
      ocp4_workload_gitlab_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"

      # 20 workshop participants
      ocp4_workload_gitlab_user_count: 20
      ocp4_workload_gitlab_user_base: participant
      ocp4_workload_gitlab_user_password: "devsecops2024"

      # Instructor/root repositories
      ocp4_workload_gitlab_root_repositories:
      # Private solutions and grading
      - name: "solutions"
        url: "https://github.com/instructor/devsecops-solutions.git"
        visibility: "private"

      # Public workshop guide
      - name: "workshop-guide"
        url: "https://github.com/workshop/devsecops-guide.git"
        visibility: "public"

      # Shared CI/CD templates
      - name: "pipeline-templates"
        url: "https://github.com/workshop/pipeline-templates.git"
        visibility: "internal"

      # Participant repositories (imported for each user)
      ocp4_workload_gitlab_user_repositories:
      # Vulnerable application for security scanning
      - name: "vulnerable-app"
        url: "https://github.com/workshop/vulnerable-app.git"
        visibility: "private"
        access_level: "developer"

      # Secure coding examples - participants can experiment
      - name: "secure-coding-lab"
        url: "https://github.com/workshop/secure-coding.git"
        visibility: "private"
        access_level: "maintainer"

      # Container image scanning lab
      - name: "container-security-lab"
        url: "https://github.com/workshop/container-security.git"
        visibility: "private"
        access_level: "developer"

      # GitOps manifests for deployment
      - name: "gitops-config"
        url: "https://github.com/workshop/gitops-manifests.git"
        visibility: "private"
        access_level: "developer"

      # Read-only security policies reference
      - name: "security-policies"
        url: "https://github.com/company/security-policies.git"
        visibility: "internal"
        access_level: "reporter"

      # Storage for large workshop
      ocp4_workload_gitlab_volume_size: 150Gi
      ocp4_workload_gitlab_postgresql_volume_size: 75Gi
