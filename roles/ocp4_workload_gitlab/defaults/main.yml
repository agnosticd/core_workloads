---
become_override: false
ocp_username: system:admin
silent: false

# --------------------------------
# GitLab Installation Settings
# --------------------------------

# GitLab namespace
ocp4_workload_gitlab_namespace: gitlab

# GitLab image and version
ocp4_workload_gitlab_image: gitlab/gitlab-ce
ocp4_workload_gitlab_image_tag: "16.11.1-ce.0"

# Use HTTPS route for GitLab
ocp4_workload_gitlab_ssl_route: true

# Hostname for the GitLab Route (optional)
# If not set, OpenShift will generate one
# ocp4_workload_gitlab_hostname: gitlab

# --------------------------------
# Storage Settings
# --------------------------------

# PVC size for GitLab data
ocp4_workload_gitlab_volume_size: 50Gi

# Storage class for GitLab PVC
# Empty string uses the default storage class
ocp4_workload_gitlab_volume_storage_class: ''

# --------------------------------
# Authentication Settings
# --------------------------------

# Authentication mode: native or keycloak
ocp4_workload_gitlab_auth_mode: native

# Root user password
# If empty, a random password will be generated (recommended)
# IMPORTANT: Password must be at least 8 characters long
# Auto-generated by default for security
ocp4_workload_gitlab_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
ocp4_workload_gitlab_root_password_length: 16

# NOTE: The role automatically creates a 'gitlab-root-token' secret in the
# GitLab namespace containing a long-lived Personal Access Token (PAT) with
# full API access. This token is used for automation (Keycloak sync, etc.)
# and is available for external tools to interact with the GitLab API.
# Secret: gitlab-root-token (key: token)
# Scopes: api, read_api, read_user, read_repository, write_repository, sudo
# Expiration: 365 days

# --------------------------------
# User Creation Settings (Native Auth Only)
# --------------------------------

# IMPORTANT: Users are only created when:
#   1. ocp4_workload_gitlab_auth_mode == 'native' AND
#   2. ocp4_workload_gitlab_user_count > 0
#
# In Keycloak mode, users authenticate via SSO and are NOT created by this role.
# The Keycloak group sync cronjob manages group membership for SSO users.

# Base name for users (e.g., user1, user2, ...)
ocp4_workload_gitlab_user_base: "{{ ocp4_workload_authentication_htpasswd_user_base | default('user') }}"

# Number of users to create (0 = no users created)
ocp4_workload_gitlab_user_count: >-
  {{ ocp4_workload_authentication_htpasswd_user_count | default(user_count) | default(num_users) | default(0) }}

# User password
# Auto-generated by default for security
ocp4_workload_gitlab_user_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
ocp4_workload_gitlab_user_password_length: 16

# User email domain
ocp4_workload_gitlab_user_email_domain: example.com

# --------------------------------
# Repository Import Settings (Root)
# --------------------------------

# List of repositories to import for root user
# If list is not empty, repositories will be imported
# Each entry should have:
#   - name: Repository name in GitLab (required)
#   - url: Git URL to import from (required)
#   - visibility: Repository visibility (required)
#       * public: Visible to everyone
#       * internal: Visible to authenticated users
#       * private: Visible only to project members
#
# Example:
# ocp4_workload_gitlab_root_repositories:
# - name: "agnosticd-v2"                              # Name of the repository in GitLab
#   url: "https://github.com/agnosticd/agnosticd-v2.git"  # Source Git URL to import from
#   visibility: "public"                              # Make it visible to everyone
# - name: "core-workloads"
#   url: "https://github.com/agnosticd/core_workloads.git"
#   visibility: "internal"                            # Only authenticated users can see it
# - name: "private-config"
#   url: "https://github.com/example/private-config.git"
#   visibility: "private"                             # Only root user can see it

ocp4_workload_gitlab_root_repositories: []

# --------------------------------
# Repository Import Settings (Users)
# --------------------------------

# List of repositories to import for each user
# ONLY applies when auth_mode is 'native' AND user_count > 0
# If list is not empty, repositories will be imported for all created users
# Each entry should have:
#   - name: Repository name in GitLab (required)
#   - url: Git URL to import from (required)
#   - visibility: Repository visibility (required)
#       * public: Visible to everyone
#       * internal: Visible to authenticated users
#       * private: Visible only to user and project members
#   - access_level: User's access level (optional, defaults to "developer")
#       * guest (10): Can view but cannot push
#       * reporter (20): Can view and create issues
#       * developer (30): Can push to non-protected branches
#       * maintainer (40): Can push to protected branches
#       * owner (50): Full admin access to the repository
#
# Example:
# ocp4_workload_gitlab_user_repositories:
# - name: "sample-app"                                # Repository created for each user
#   url: "https://github.com/example/sample-app.git"  # Source Git URL to import from
#   visibility: "private"                             # Each user's repo is private to them
#   access_level: "developer"                         # Users get developer access (can push)
# - name: "workshop-exercises"
#   url: "https://github.com/workshop/exercises.git"
#   visibility: "internal"                            # Visible to all authenticated users
#   access_level: "maintainer"                        # Users get maintainer access (can manage)
# - name: "readonly-docs"
#   url: "https://github.com/docs/reference.git"
#   visibility: "public"                              # Visible to everyone
#   access_level: "reporter"                          # Users can only read and comment

ocp4_workload_gitlab_user_repositories: []

# Default access level for users (native mode)
ocp4_workload_gitlab_user_default_access_level: developer

# --------------------------------
# Application Settings
# --------------------------------

# GitLab application settings
# If not empty, these settings will be applied via the API
# See https://docs.gitlab.com/ee/api/settings.html for available settings
#
# Default settings optimize GitLab for workshop/lab environments:
# - Enable git, github, and gitea as import sources
# - Disable version check (phone home to GitLab)
# - Allow webhooks to local network (useful for internal services)
# - Disable Auto DevOps (reduces resource usage)
# - Disable rate limiting (better for workshop scenarios)
#
# To customize, override this variable with your desired settings.
# To skip application settings configuration, set to empty dict: {}
#
# Example with additional settings:
# ocp4_workload_gitlab_application_settings:
#   import_sources:
#   - git
#   - github
#   - gitea
#   version_check_enabled: false
#   signup_enabled: false
#   gravatar_enabled: true
#   default_projects_limit: 100
#   password_authentication_enabled_for_web: true

ocp4_workload_gitlab_application_settings:
  import_sources:
  - git
  - github
  - gitea
  version_check_enabled: false
  allow_local_requests_from_web_hooks_and_services: true
  auto_devops_enabled: false
  throttle_unauthenticated_enabled: false
  throttle_authenticated_api_enabled: false
  throttle_authenticated_web_enabled: false

# --------------------------------
# Keycloak Integration Settings
# --------------------------------

# Keycloak namespace
ocp4_workload_gitlab_keycloak_namespace: keycloak

# Keycloak realm
ocp4_workload_gitlab_keycloak_realm: sso

# Keycloak client ID for GitLab
ocp4_workload_gitlab_keycloak_client_id: gitlab

# Keycloak client secret (will be generated if empty)
ocp4_workload_gitlab_keycloak_client_secret: ""

# Keycloak group sync cronjob schedule (every minute by default)
ocp4_workload_gitlab_keycloak_sync_schedule: "*/1 * * * *"

# Keycloak group to GitLab group mapping
# Groups in Keycloak will be created to match GitLab groups
ocp4_workload_gitlab_keycloak_groups:
- name: "developers"
  access_level: "developer"
- name: "maintainers"
  access_level: "maintainer"

# --------------------------------
# PostgreSQL Settings
# --------------------------------

# PostgreSQL image
ocp4_workload_gitlab_postgresql_image: registry.redhat.io/rhel9/postgresql-16
ocp4_workload_gitlab_postgresql_image_tag: latest

# PostgreSQL volume size
ocp4_workload_gitlab_postgresql_volume_size: 20Gi

# PostgreSQL storage class
ocp4_workload_gitlab_postgresql_volume_storage_class: ''

# PostgreSQL credentials
ocp4_workload_gitlab_postgresql_user: gitlab
ocp4_workload_gitlab_postgresql_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
ocp4_workload_gitlab_postgresql_database: gitlabhq_production

# --------------------------------
# Redis Settings
# --------------------------------

# Redis image
ocp4_workload_gitlab_redis_image: registry.redhat.io/rhel9/redis-7
ocp4_workload_gitlab_redis_image_tag: latest

# Redis password
ocp4_workload_gitlab_redis_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"

# --------------------------------
# Resource Limits
# --------------------------------

ocp4_workload_gitlab_memory_request: 4Gi
ocp4_workload_gitlab_memory_limit: 8Gi
ocp4_workload_gitlab_cpu_request: 2
ocp4_workload_gitlab_cpu_limit: 4

# --------------------------------
# Timeout Settings
# --------------------------------

# Wait time for GitLab to be ready (seconds)
ocp4_workload_gitlab_wait_retries: 60
ocp4_workload_gitlab_wait_delay: 10
