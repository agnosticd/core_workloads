---
- name: Set bastion host from inventory group
  when: "'bastions' in groups and groups['bastions'] | length > 0"
  ansible.builtin.set_fact:
    _bastion_host: "{{ groups['bastions'][0] }}"

- name: Add bastion host dynamically from variables
  when:
  - _bastion_host is not defined
  - bastion_ansible_host is defined
  - bastion_ansible_user is defined
  - bastion_ansible_ssh_pass is defined
  block:
  - name: Add bastion to inventory
    ansible.builtin.add_host:
      name: "{{ bastion_ansible_host }}"
      groups: bastions
      ansible_user: "{{ bastion_ansible_user }}"
      ansible_ssh_pass: "{{ bastion_ansible_ssh_pass }}"
      ansible_port: "{{ bastion_ansible_port | default(22) }}"

  - name: Set bastion host fact from variables
    ansible.builtin.set_fact:
      _bastion_host: "{{ bastion_ansible_host }}"

- name: Skip shp installation when no bastion available
  when: _bastion_host is not defined
  ansible.builtin.debug:
    msg: "No bastion host available - skipping shp installation"

- name: Try to install shp
  when: _bastion_host is defined
  become: true
  delegate_to: "{{ _bastion_host }}"
  vars:
    ansible_ssh_extra_args: "-F /dev/null"
  block:
  - name: Download shp cli tool
    ansible.builtin.get_url:
      url: "{{ ocp4_workload_builds_install_cli_tools_url }}"
      dest: /tmp/shp-linux-amd64.tar.gz
      validate_certs: false
      owner: root
      group: root
      mode: ug=rwx,o=rx
    retries: 10
    delay: 5
    register: r_shp
    ignore_errors: true

  - name: Install shp CLI on bastion
    ansible.builtin.unarchive:
      src: /tmp/shp-linux-amd64.tar.gz
      remote_src: true
      dest: /usr/bin
      mode: ug=rwx,o=rx
      owner: root
      group: root
    args:
      creates: /usr/bin/shp

  - name: Copy shp-linux-amd64 to shp
    ansible.builtin.copy:
      src: /usr/bin/shp-linux-amd64
      dest: /usr/bin/shp
      remote_src: true
      mode: ug=rwx,o=rx
      owner: root
      group: root
    args:
      creates: /usr/bin/shp

  - name: Remove shp-linux-amd64
    ansible.builtin.file:
      path: /usr/bin/shp-linux-amd64
      state: absent

  - name: Remove downloaded file
    ansible.builtin.file:
      state: absent
      path: /tmp/shp-linux-amd64.tar.gz

  # command: does not work here - somehow the parameters don't get passed properly
  - name: Setup shp bash completion
    when: r_shp is succeeded
    ansible.builtin.shell: "/usr/bin/shp completion bash >/etc/bash_completion.d/shp"
    args:
      creates: /etc/bash_completion.d/shp
    ignore_errors: true
