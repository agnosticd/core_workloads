---
# --------------------------------
# Quay Operator
# --------------------------------

# Install the Quay Operator
ocp4_workload_quay_operator_install_operator: true

# Operator channel to subscribe to
ocp4_workload_quay_operator_channel: stable-3.15

# Operator namespace
ocp4_workload_quay_operator_namespace: openshift-operators

# Set automatic InstallPlan approval. If set to false it is also suggested
# to set the starting_csv to pin a specific version
# This variable has no effect when using a catalog snapshot (always true)
ocp4_workload_quay_operator_automatic_install_plan_approval: true

# Set a starting ClusterServiceVersion.
# Recommended to leave empty to get latest in the channel when not using
# a catalog snapshot.
# Highly recommended to be set when using a catalog snapshot but can be
# empty to get the latest available in the channel at the time when
# the catalog snapshot got created.
# ocp4_workload_quay_operator_starting_csv: "quay-operator.v3.15.2"
ocp4_workload_quay_operator_starting_csv: ""

# --------------------------------
# Operator Catalog Snapshot Settings
# --------------------------------
# See https://github.com/redhat-cop/agnosticd/blob/development/docs/Operator_Catalog_Snapshots.adoc
# for instructions on how to set up catalog snapshot images

# Use a catalog snapshot
ocp4_workload_quay_operator_use_catalog_snapshot: false

# catalog snapshot namespace
ocp4_workload_quay_operator_catalogsource_namespace: openshift-operators

# Catalog Source Name when using a catalog snapshot. This should be unique
# in the cluster to avoid clashes
ocp4_workload_quay_operator_catalogsource_name: redhat-operators-snapshot-quay-operator

# Catalog snapshot image
ocp4_workload_quay_operator_catalog_snapshot_image: quay.io/rhpds/olm_snapshot_redhat_catalog

# Catalog snapshot image tag
ocp4_workload_quay_operator_catalog_snapshot_image_tag: "v4.19_2025_09_22"

# ----------------------
# QuayRegistry
# ----------------------

# Install a Quay Registry
ocp4_workload_quay_operator_registry_install: true

# Namespace to install the QuayRegistry into
ocp4_workload_quay_operator_registry_namespace: quay-enterprise

# Name of the Quay Registry
ocp4_workload_quay_operator_registry_name: quay

# Quay hostname. Default is quay-{{ guid }}
ocp4_workload_quay_operator_registry_hostname: "quay-{{ guid }}"

# Quay Route. Can be overwritten with a fully qualified hostname.
# When empty the route will be quay.basedomain
ocp4_workload_quay_operator_registry_route: ""

ocp4_workload_quay_operator_registry_display_name: "Red Hat Demo Platform Quay"

# Quay Admin User
ocp4_workload_quay_operator_registry_configure_admin: true
ocp4_workload_quay_operator_registry_admin_user: quayadmin

# Set password for admin user.
# If the password is not specified or empty it will be generated with length specified
# in {{ ocp4_workload_quay_operator_registry_admin_password_length }}
ocp4_workload_quay_operator_registry_admin_password: ""
ocp4_workload_quay_operator_registry_admin_password_length: 20

# Quay Registry Features
ocp4_workload_quay_operator_registry_enable_clair: true
ocp4_workload_quay_operator_registry_clair_volume_size: 100Gi
ocp4_workload_quay_operator_registry_enable_hpa: false
ocp4_workload_quay_operator_registry_enable_mirror: false
ocp4_workload_quay_operator_registry_enable_monitoring: false
# Quay component overrides - individual values
# Enable/disable override sections
ocp4_workload_quay_operator_registry_quay_overrides: false
ocp4_workload_quay_operator_registry_quay_overrides_env: true
ocp4_workload_quay_operator_registry_quay_overrides_resources: true

# Worker counts
ocp4_workload_quay_operator_registry_quay_worker_count: "2"
ocp4_workload_quay_operator_registry_quay_worker_count_registry: "8"

# Resource requests and limits
ocp4_workload_quay_operator_registry_quay_cpu_request: "2"
ocp4_workload_quay_operator_registry_quay_memory_request: "8Gi"
ocp4_workload_quay_operator_registry_quay_cpu_limit: "4"
ocp4_workload_quay_operator_registry_quay_memory_limit: "16Gi"

# Quay app replica count override (default: operator-managed)
ocp4_workload_quay_operator_registry_quay_replicas: 2

# Clair resource and replica overrides
ocp4_workload_quay_operator_registry_clair_resources_update: false
ocp4_workload_quay_operator_registry_clair_replicas: 1
ocp4_workload_quay_operator_registry_clair_requests_cpu: "2000m"
ocp4_workload_quay_operator_registry_clair_requests_memory: "2Gi"
ocp4_workload_quay_operator_registry_clair_limits_cpu: "2"
ocp4_workload_quay_operator_registry_clair_limits_memory: "4Gi"

# Explicitly manage the clairpostgres component
ocp4_workload_quay_operator_registry_enable_clairpostgres: false

# Startup probe override (disabled by default)
ocp4_workload_quay_operator_registry_startup_probe_update: false
ocp4_workload_quay_operator_registry_startup_probe_failure_threshold: 30

# --------------------------------
# Storage Backend Configuration
# --------------------------------
# Set to true to use S4 storage, false to use Noobaa (OCS)
# Default: false (uses Noobaa/OpenShift Container Storage)
ocp4_workload_quay_operator_use_s4_storage: false

# --------------------------------
# S3 Storage Configuration (S4)
# --------------------------------
# Only used when ocp4_workload_quay_operator_use_s4_storage: true
# Quay uses S4 storage for object storage backend

# S4 S3 endpoint configuration
ocp4_workload_quay_operator_s4_namespace: s4
ocp4_workload_quay_operator_s4_bucket_name: quay-registry

# S4 S3 credentials (should match S4 deployment)
ocp4_workload_quay_operator_s4_access_key: s4admin
ocp4_workload_quay_operator_s4_secret_key: s4secret

# S3 endpoint - uses internal service endpoint
# Format: http://s4.<namespace>.svc.cluster.local:7480
ocp4_workload_quay_operator_s4_endpoint: "http://s4.{{ ocp4_workload_quay_operator_s4_namespace }}.svc.cluster.local:7480"

# S3 region
ocp4_workload_quay_operator_s4_region: us-east-1
